<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KandaLedger — ระบบบันทึกค่าใช้จ่าย</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="app-header">
  <div class="brand">
    <span class="logo" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l3-4 3 3 4-6"/></svg>
    </span>
    <span>KandaLedger<small>ระบบบันทึกค่าใช้จ่าย</small></span>
  </div>

  <nav class="seg" id="moduleSeg" aria-label="เลือกโมดูล">
    <button data-module="utility" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h7l-1 8 10-12h-7l1-8z"/></svg>
      <span>ค่าน้ำค่าไฟ</span>
    </button>
    <button data-module="purchase">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
      <span>สั่งซื้อ</span>
    </button>
  </nav>

  <div class="header-spacer"></div>

  <div class="header-actions">
    <button class="btn btn-icon btn-ghost theme-toggle no-print" id="themeBtn" title="สลับโหมดสว่าง/มืด" aria-label="สลับธีม">
      <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    </button>
    <button class="btn btn-ghost btn-sm no-print hidden" id="lockBtn" title="ล็อกหน้าจอ / ออกจากระบบ">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <span>ล็อกหน้าจอ</span>
    </button>
  </div>
</header>

<main id="view" class="container" aria-live="polite">
  <!-- rendered by app.js -->
</main>

<!-- Generic modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal" id="modalBox" role="dialog" aria-modal="true"></div>
</div>

<!-- Toasts -->
<div class="toast-wrap" id="toastWrap" aria-live="polite"></div>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
